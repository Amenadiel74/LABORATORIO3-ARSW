syntax = "proto3";
option java_multiple_files = true;
option java_package = "edu.eci.arsw.medical";

service MedicalService {
    rpc GetSpecialties (SpecialtyRequest) returns (SpecialtyList);
    rpc GetAvailability (AvailabilityRequest) returns (AvailabilityResponse);
}

message SpecialtyRequest {}

message Specialty {
    string name        = 1;
    string description = 2;
    int32  slots       = 3;
}

message SpecialtyList {
    repeated Specialty specialties = 1;
}

message AvailabilityRequest {
    string specialty = 1;
    string date      = 2;
}

message AvailabilityResponse {
    bool   available   = 1;
    int32  slots_left  = 2;
}
